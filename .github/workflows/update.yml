name: Automated AI Updates

on:
  workflow_dispatch:

  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Update Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3-flash-preview,gemini-3.5-flash,gemini-3.1-flash-lite,gemini-2.5-flash
        run: |
          python scripts/update.py

      - name: Show Generated Files
        run: |
          echo "============================"
          echo "Current directory:"
          pwd

          echo ""
          echo "Repository tree:"
          find .

          echo ""
          echo "Git status:"
          git status

      - name: Commit and Push
        run: |
          git config user.name "Vinodh Kumar"
          git config user.email "264774659+vkvinodhkumar@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Automatic AI Update - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          git push origin main